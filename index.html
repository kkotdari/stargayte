<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: 모바일 키보드가 뜰 때 브라우저가 문서를 스크롤해서
         포커스된 인풋을 보이게 하는 대신, 레이아웃 뷰포트 자체를 키보드 높이만큼 줄인다.
         이걸로 포커스 시 화면이 밀리는 것과 타이핑 중 스크롤이 튀는 문제의 원인(키보드가
         뜨고 닫힐 때마다 브라우저가 자체적으로 스크롤 위치를 재조정하는 것)을 없앤다. -->
    <!-- viewport-fit=cover가 없으면 사파리는 노치/하단 홈 인디케이터 영역을 화면 밖(안전
         영역 바깥)으로 두고 그만큼 뷰포트를 줄여서 보여준다 — env(safe-area-inset-bottom)도
         이 값 없이는 항상 0으로 계산돼, 아래 탭바/스크롤탑 버튼의 안전영역 여백 계산
         (calc(...+ env(safe-area-inset-bottom))) 자체가 무의미해진다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover" />
    <!-- 홈 화면에 추가했을 때 사파리 브라우저 창(주소창 + 하단 툴바, 스크롤에 따라
         늘었다 줄었다 하며 뷰포트 높이를 계속 바꾼다) 없이 완전 독립 실행(standalone)
         모드로 열리게 한다 — 이게 없으면 "웹앱으로 추가"해도 그냥 사파리 탭 하나가
         열릴 뿐이라, 사파리 자체의 UI 접힘/펼침에 따라 뷰포트 높이가 매번 달라져서
         탭바 높이나 스크롤탑 버튼이 가려지는 정도가 그때그때 달라져 보였다. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="스타게이트" />
    <!-- 매니페스트/theme-color가 없으면 iOS가 홈 화면 웹앱 실행 시 보여줄 스플래시가
         아예 없어서, 페이지가 아직 로딩/뷰포트 정착 중인 실제 모습이 그대로 화면에
         노출된다(탭바가 느리게 제자리를 잡는 것처럼 보이던 문제의 근본 원인 — 스플래시가
         있는 다른 앱들은 이 정착 과정을 가려준다). void 배경색과 맞춘다. -->
    <meta name="theme-color" content="#060607" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.png">
    <!-- 홈 화면 아이콘 — 파비콘(favicon.png, 128x128)을 180x180으로 키운 버전. 원본에
         투명 배경이 있어 iOS가 그 자리를 검게 채워 보여주는데, 앱 자체가 어두운 배경
         (--void)이라 크게 어색하지 않다. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>스타게이트 - 스타크래프트: 리마스터 동호회</title>
    <!-- 라이트 테마 여부(.scr-light-theme, utils/theme.ts)는 원래 React 컴포넌트가 마운트된
         후 useEffect에서만 <html>에 적용됐다 — 그런데 로그인 세션 확인/데이터 로딩 중 뜨는
         부트 스피너(App.tsx)는 그 컴포넌트들보다 먼저 그려지므로, 라이트 테마 사용자도
         그 몇 초간은 항상 어두운 기본 테마로 보였다가 나중에 확 밝아졌다(실제로 지적받은
         문제 — "잠깐 까만 화면에 스피너"). React가 로드되기도 전에, 최대한 빨리 저장된
         값을 읽어 바로 클래스를 붙여서 그 깜빡임 자체를 없앤다. -->

    <script>
      try {
        if (localStorage.getItem("scr-light-theme") === "1") {
          document.documentElement.classList.add("scr-light-theme");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
