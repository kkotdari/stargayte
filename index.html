<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: 모바일 키보드가 뜰 때 브라우저가 문서를 스크롤해서
         포커스된 인풋을 보이게 하는 대신, 레이아웃 뷰포트 자체를 키보드 높이만큼 줄인다.
         이걸로 포커스 시 화면이 밀리는 것과 타이핑 중 스크롤이 튀는 문제의 원인(키보드가
         뜨고 닫힐 때마다 브라우저가 자체적으로 스크롤 위치를 재조정하는 것)을 없앤다. -->
    <!-- viewport-fit=cover가 없으면 사파리는 노치/하단 홈 인디케이터 영역을 화면 밖(안전
         영역 바깥)으로 두고 그만큼 뷰포트를 줄여서 보여준다 — env(safe-area-inset-bottom)도
         이 값 없이는 항상 0으로 계산돼, 아래 탭바/스크롤탑 버튼의 안전영역 여백 계산
         (calc(...+ env(safe-area-inset-bottom))) 자체가 무의미해진다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover" />
    <!-- 홈 화면에 추가했을 때 사파리 브라우저 창(주소창 + 하단 툴바, 스크롤에 따라
         늘었다 줄었다 하며 뷰포트 높이를 계속 바꾼다) 없이 완전 독립 실행(standalone)
         모드로 열리게 한다 — 이게 없으면 "웹앱으로 추가"해도 그냥 사파리 탭 하나가
         열릴 뿐이라, 사파리 자체의 UI 접힘/펼침에 따라 뷰포트 높이가 매번 달라져서
         탭바 높이나 스크롤탑 버튼이 가려지는 정도가 그때그때 달라져 보였다. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- default: 하단 탭바가 진짜 화면 바닥에 붙게(하단 몰입 완성) 하려고 쓴다.
         black-translucent은 레이아웃 뷰포트를 상태바만큼 짧게 잡아 물리 화면 하단 ~59px가
         웹뷰 밖(렌더 불가)이 되어 탭바를 바닥에 못 붙였다(실측/신고: "하단이 잘려"). default는
         iOS가 상태바 영역을 theme-color(다크 #060607 / 라이트 #ffffff, theme.ts가 동적 갱신)로
         예약하고 그 아래부터 웹뷰가 화면 바닥까지 꽉 차게 준다 — 상태바 글자색은 iOS가
         theme-color 밝기에 맞춰 자동(다크→흰 글자, 라이트→검은 글자). 다크 앱에선 상태바색이
         헤더/배경과 거의 같아 "바"처럼 튀지 않는다. 이때 env(safe-area-inset-top)은 0이 되어
         아래 --safe-top 기반 보정(헤더/스티키/스크림)은 자연히 0으로 잠든다(이중 여백 없음).
         참고: iOS는 이 값을 "홈 화면에 추가" 시점에만 읽으므로, 이미 설치된 PWA는 아이콘
         삭제 후 다시 추가해야 반영된다. -->
    <!-- black-translucent: PWA에서 콘텐츠가 상단 상태바 뒤까지 그려진다(지적: "PWA에서
         위는 안 나오고") — default는 상태바가 불투명해 위쪽이 항상 잘렸다. 콘텐츠가
         노치/상태바에 가리지 않게 하는 보정은 이미 --safe-top(부트 스크립트 실측)이
         담당한다. 참고: iOS는 이 값을 "홈 화면에 추가" 시점에만 읽으므로, 이미 설치된
         PWA는 아이콘 삭제 후 다시 추가해야 반영된다. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="스타게이트" />
    <!-- 매니페스트/theme-color가 없으면 iOS가 홈 화면 웹앱 실행 시 보여줄 스플래시가
         아예 없어서, 페이지가 아직 로딩/뷰포트 정착 중인 실제 모습이 그대로 화면에
         노출된다(탭바가 느리게 제자리를 잡는 것처럼 보이던 문제의 근본 원인 — 스플래시가
         있는 다른 앱들은 이 정착 과정을 가려준다). void 배경색과 맞춘다. -->
    <meta name="theme-color" content="#060607" />
    <!-- 루트 color-scheme을 CSS(번들)보다 먼저 선언한다 — CSS 로드 전 첫 프레임에 사파리가
         "라이트 페이지"로 판정해 버리면 다크 테마에서 위아래에 불투명 백킹(검은 띠)을 깐
         채로 굳는 레이스가 있었다(간헐적 잘림의 원인). 라이트 테마 저장 시 아래 부트
         스크립트가 light로 바꾼다(theme.ts가 토글 시에도 동기화). -->
    <meta name="color-scheme" content="dark" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.png">
    <!-- 홈 화면 아이콘 — 파비콘(favicon.png, 128x128)을 180x180으로 키운 버전. 원본에
         투명 배경이 있어 iOS가 그 자리를 검게 채워 보여주는데, 앱 자체가 어두운 배경
         (--void)이라 크게 어색하지 않다. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>스타게이트 - 스타크래프트: 리마스터 동호회</title>
    <!-- 라이트 테마 여부(.scr-light-theme, utils/theme.ts)는 원래 React 컴포넌트가 마운트된
         후 useEffect에서만 <html>에 적용됐다 — 그런데 로그인 세션 확인/데이터 로딩 중 뜨는
         부트 스피너(App.tsx)는 그 컴포넌트들보다 먼저 그려지므로, 라이트 테마 사용자도
         그 몇 초간은 항상 어두운 기본 테마로 보였다가 나중에 확 밝아졌다(실제로 지적받은
         문제 — "잠깐 까만 화면에 스피너"). React가 로드되기도 전에, 최대한 빨리 저장된
         값을 읽어 바로 클래스를 붙여서 그 깜빡임 자체를 없앤다. -->

    <!-- 위 html 클래스와 같은 이유로, 상태바/주소창 색(theme-color)도 React가 뜨기 전에
         미리 맞춰둔다 — 안 그러면 라이트 테마 사용자도 페이지는 흰 배경으로 바로 뜨는데
         브라우저 크롬(주소창)만 몇 초간 기본 다크 값(#060607) 그대로 남아 어긋나 보인다
         (theme.ts의 applyThemeColor와 정확히 같은 다크/라이트 값을 쓴다). -->
    <script>
      try {
        if (localStorage.getItem("scr-light-theme") === "1") {
          document.documentElement.classList.add("scr-light-theme");
          document.querySelector('meta[name="theme-color"]')?.setAttribute("content", "#ffffff");
          document.querySelector('meta[name="color-scheme"]')?.setAttribute("content", "light");
        } else {
          /* 다크는 theme-color 메타를 제거(theme.ts와 동일 재확정) — 어두운 theme-color가
             있으면 사파리가 다크 페이지 위아래에 불투명 백킹을 깐다(토글 실험으로 확인).
             시스템 다크는 color-scheme이, PWA 상태바는 매니페스트가 담당. */
          document.querySelector('meta[name="theme-color"]')?.remove();
        }
      } catch (e) {}

      /* 상단 안전영역(상태바/노치 높이) 실측 — env(safe-area-inset-top)을 폭 0짜리 프로브의
         padding-top으로 받아 그 offsetHeight를 재서 --safe-area-top에 넣는다. iOS
         standalone에서 이 값이 최초엔 0이었다가 리플로우 후 채워지는 버그를 이기려고,
         로드 직후뿐 아니라 리사이즈/방향전환/짧은 지연 틱마다 다시 잰다(한 번이라도 실제
         값이 잡히면 그때 반영된다). CSS는 max(env, var(--safe-area-top))로 쓰므로 여기서
         재는 게 실패해도 최소한 env 값은 그대로 유지된다. */
      (function () {
        var root = document.documentElement;
        function readSafeTop() {
          try {
            var probe = document.createElement("div");
            probe.style.cssText =
              "position:fixed;top:0;left:0;width:0;visibility:hidden;pointer-events:none;padding-top:env(safe-area-inset-top,0px);";
            (document.body || root).appendChild(probe);
            var h = probe.offsetHeight;
            probe.parentNode.removeChild(probe);
            if (h > 0) root.style.setProperty("--safe-area-top", h + "px");
          } catch (e) {}
        }
        /* 하단 빈 뷰포트 간격 — black-translucent standalone에선 iOS가 레이아웃 뷰포트를
           상태바 높이만큼 짧게(innerHeight = screen.height - 상태바) 잡고 위에 앵커해서,
           물리 화면 하단에 그만큼 빈 영역이 생긴다(실측 852-793=59). position:fixed 하단
           요소들을 이 값만큼 아래로 내려 화면 바닥까지 닿게 하려고 --vp-bottom-gap에 넣는다.
           키보드가 뜨면 interactive-widget=resizes-content로 innerHeight가 확 줄어 gap이
           엉뚱하게 커지므로, 이 값은 로드/방향전환/지연 틱에서만 재고(그때는 키보드 없음)
           plain resize(키보드 개폐 포함)에선 재지 않는다. standalone이 아니면 0. */
        function readBottomGap() {
          try {
            var standalone =
              (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
              window.navigator.standalone === true;
            var gap = standalone ? Math.max(0, window.screen.height - window.innerHeight) : 0;
            if (gap > 120) gap = 0; // 비정상적으로 큰 값(키보드 등)은 무시
            root.style.setProperty("--vp-bottom-gap", gap + "px");
          } catch (e) {}
        }
        function schedule() {
          readSafeTop();
          readBottomGap();
          // 리플로우 이후 값이 채워지는 케이스를 잡으려고 몇 번 더 늦게 잰다.
          [80, 300, 800].forEach(function (t) { setTimeout(function () { readSafeTop(); readBottomGap(); }, t); });
        }
        if (document.body) schedule();
        else document.addEventListener("DOMContentLoaded", schedule);
        // plain resize는 키보드 개폐로도 발생하므로 상단 inset만 갱신(하단 gap은 제외).
        window.addEventListener("resize", readSafeTop);
        window.addEventListener("orientationchange", schedule);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
